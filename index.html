<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="index.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
  </head>
  <body onload="getWeather()">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar bg-primary" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Weather App</a>
      <form class="d-flex" role="search">
        <input class="form-control me-2" id="city_name" type="text" placeholder="Enter city name" aria-label="Search"/>
        <button class="btn btn-outline-dark" type="button" onclick="getWeather1()">Search</button>
      </form>
    </div>
  </div>
</nav>


 <!-- CARD TO SHOW DETAILS  -->
<div class="card mx-auto mt-5" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title">Weather of <span id="city1"></span></h5>
    <h6 class="card-subtitle mb-2 text-body-secondary" >Temperature: <span id="temp_c"></span> °C</h6>
    <h6 class="card-subtitle mb-2 text-body-secondary" >Humidity: <span id="humidity"></span> %</h6>
    <h6 class="card-subtitle mb-2 text-body-secondary" >Wind_speed: <span id="wind_kph"></span> kph</h6>
    <h6 class="card-subtitle mb-2 text-body-secondary" >Feel_like: <span id="feelslike_c"></span></h6>
    <h6 class="card-subtitle mb-2 text-body-secondary" >Weather Conditions: <span id="text"></span></h6>
    <img src="" alt="" id="icon">
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="index.js"></script>
  </body>
</html>
